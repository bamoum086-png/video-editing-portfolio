<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Influencer Architecture | Mohamed B.</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Vimeo Player API -->
    <script src="https://player.vimeo.com/api/player.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #050505; 
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .text-gradient-ai {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-grid {
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
        }

        /* --- Animations --- */
        @keyframes flow {
            0% { stroke-dashoffset: 24; }
            100% { stroke-dashoffset: 0; }
        }
        .flow-line {
            stroke-dasharray: 4 8;
            animation: flow 1s linear infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
            will-change: transform, opacity;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Button Glare Effect */
        .btn-glare {
            position: relative;
            overflow: hidden;
        }
        .btn-glare::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: glare 3s infinite;
        }
        @keyframes glare {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* --- 7-Second Analytics Loop Animations --- */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            40% { top: 100%; opacity: 1; }
            50% { opacity: 0; }
            100% { top: 0%; opacity: 0; }
        }
        .animate-scan { animation: scan 7s ease-in-out infinite; }

        @keyframes drawGraph {
            0%, 20% { stroke-dashoffset: 1000; }
            50%, 100% { stroke-dashoffset: 0; }
        }
        .animate-graph {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawGraph 7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes smartPointer {
            0% { transform: translate(150px, 150px) scale(0); opacity: 0; } 
            10% { transform: translate(150px, 150px) scale(1); opacity: 1; } 
            25% { transform: translate(20px, 20px) scale(1); opacity: 1; } 
            30% { transform: translate(20px, 20px) scale(0.8); opacity: 1; } 
            35% { transform: translate(20px, 20px) scale(1); opacity: 1; }
            50% { transform: translate(20px, 120px) scale(1); opacity: 1; } 
            65% { transform: translate(220px, 40px) scale(1); opacity: 1; } 
            70% { transform: translate(220px, 40px) scale(0.8); opacity: 1; } 
            75% { transform: translate(220px, 40px) scale(1); opacity: 1; }
            85% { transform: translate(220px, 120px) scale(1); opacity: 1; } 
            95% { transform: translate(300px, 200px) scale(0); opacity: 0; } 
            100% { opacity: 0; }
        }
        .animate-pointer {
            animation: smartPointer 7s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
            filter: drop-shadow(0px 10px 8px rgba(0, 242, 254, 0.4));
            will-change: transform, opacity;
        }

        /* Highlight effects */
        @keyframes highlightBox1 {
            0%, 25% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); }
            30%, 40% { box-shadow: 0 0 30px rgba(16,185,129,0.3); border-color: rgba(16,185,129,0.8); }
            100% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); }
        }
        .highlight-1 { animation: highlightBox1 7s infinite; }

        @keyframes highlightBox2 {
            0%, 65% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); }
            70%, 80% { box-shadow: 0 0 30px rgba(168,85,247,0.3); border-color: rgba(168,85,247,0.8); }
            100% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); }
        }
        .highlight-2 { animation: highlightBox2 7s infinite; }
        
        @keyframes highlightBox3 {
            0%, 80% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); transform: scale(1); }
            85%, 95% { box-shadow: 0 0 40px rgba(245,158,11,0.4); border-color: rgba(245,158,11,1); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 transparent; border-color: rgba(255,255,255,0.1); transform: scale(1); }
        }
        .highlight-3 { animation: highlightBox3 7s infinite; }

        @keyframes redGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(225, 29, 72, 0.4); }
            50% { box-shadow: 0 0 45px rgba(225, 29, 72, 0.85); transform: scale(1.01); }
        }
        .animate-red-glow { animation: redGlow 2s infinite ease-in-out; }

        @keyframes fillBar { from { width: 0%; } to { width: 100%; } }
        .animate-fill-bar { animation: fillBar 1.5s ease-out forwards; }
        
        @keyframes slideInRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide-in { animation: slideInRight 0.8s ease-out forwards; }

        @keyframes popUp { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop-up { animation: popUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .transformation-border { position: relative; }
        .transformation-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #00f2fe, #f093fb, #4facfe);
            z-index: -1;
            border-radius: 2.2rem;
            opacity: 0.3;
        }

        /* Generic Glass Button for Dynamic Coloring */
        .glass-btn {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 1px;
            border-style: solid;
        }
        .glass-btn:hover { 
            transform: scale(1.1); 
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500 selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- PRELOADER COMPONENT ---
        const Preloader = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);
            const [isHiding, setIsHiding] = useState(false);

            useEffect(() => {
                const duration = 2500; 
                const intervalTime = 25;
                const steps = duration / intervalTime;
                let currentStep = 0;

                const timer = setInterval(() => {
                    currentStep++;
                    const rawProgress = (currentStep / steps);
                    const easeOutProgress = 1 - Math.pow(1 - rawProgress, 3); 
                    
                    setProgress(Math.min(easeOutProgress * 100, 100));
                    
                    if (currentStep >= steps) {
                        clearInterval(timer);
                        setIsHiding(true);
                        setTimeout(() => onComplete(), 800); 
                    }
                }, intervalTime);

                return () => clearInterval(timer);
            }, [onComplete]);

            return (
                <div className={`fixed inset-0 z-[9999] bg-[#020202] flex flex-col items-center justify-center transition-all duration-700 ease-[cubic-bezier(0.7,0,0.3,1)] ${isHiding ? 'opacity-0 scale-105 pointer-events-none' : 'opacity-100 scale-100'}`}>
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/circuit-board.png')] opacity-10 pointer-events-none"></div>

                    <div className="relative w-36 h-36 md:w-44 md:h-44 flex items-center justify-center mb-10 group">
                        <div className="absolute inset-0 bg-cyan-500/20 rounded-full blur-[40px] animate-pulse"></div>
                        <div className="absolute inset-[-10px] rounded-full border border-white/10 border-t-cyan-400 animate-[spin_2s_linear_infinite]"></div>
                        <div className="absolute inset-[-20px] rounded-full border border-white/5 border-b-purple-400 animate-[spin_3s_linear_infinite_reverse]"></div>
                        <div className="absolute inset-[2px] rounded-full border-2 border-dashed border-cyan-500/30 animate-[spin_10s_linear_infinite]"></div>

                        <img 
                            src="https://www.upwork.com/profile-portraits/c1THF4gBsqOlPFKbSLIsTFYzEu9SSy5aZUukDa3go4_jNtzVy5qU2k4PJtZM_lVLbC" 
                            alt="Mohamed B. Workspace" 
                            className="w-full h-full rounded-full object-cover relative z-10 border-2 border-[#050505] shadow-[0_0_30px_rgba(0,242,254,0.3)] transition-transform duration-1000 scale-100"
                        />
                    </div>

                    <div className="text-center relative z-10">
                        <h2 className="text-2xl md:text-3xl font-black text-white tracking-widest uppercase mb-1 drop-shadow-lg">Mohamed B.</h2>
                        <div className="flex items-center justify-center gap-2 text-cyan-400 text-[10px] md:text-xs font-bold tracking-[0.3em] uppercase mb-8">
                            <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-ping"></span>
                            Initializing AI Workspace
                        </div>
                    </div>

                    <div className="w-64 md:w-80 relative z-10">
                        <div className="flex justify-between text-[10px] text-slate-500 font-mono mb-2 uppercase tracking-widest">
                            <span>System Boot</span>
                            <span className="text-cyan-400">{Math.round(progress)}%</span>
                        </div>
                        <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden backdrop-blur-sm border border-white/10">
                            <div 
                                className="h-full bg-gradient-to-r from-cyan-500 via-purple-500 to-emerald-400 relative"
                                style={{ width: `${progress}%` }}
                            >
                                <div className="absolute top-0 right-0 bottom-0 w-10 bg-gradient-to-r from-transparent to-white/50 blur-[2px]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Video Component (تم تحسينه للتحميل المتأخر لمنع التقطيع) ---
        const InteractiveVideoCard = ({ vimeoId, badge, badgeColor, title, subtitle, colorTheme, activeVideoId, onActivate, delayClass = "", isLarge = false }) => {
            const isPutin = vimeoId === "1178509950"; 
            
            const cardRef = useRef(null);
            const iframeRef = useRef(null);
            const playerRef = useRef(null);
            
            // إضافة حالة جديدة للتحميل المتأخر
            const [isVisible, setIsVisible] = useState(false);
            
            const [isPlaying, setIsPlaying] = useState(isPutin);
            const [isMuted, setIsMuted] = useState(true);
            const [isLoaded, setIsLoaded] = useState(false); 
            const activeIdRef = useRef(activeVideoId);

            useEffect(() => {
                activeIdRef.current = activeVideoId;
            }, [activeVideoId]);

            // مراقب التقاطع (Intersection Observer) لتحميل الفيديو فقط عند اقتراب المستخدم منه
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect(); // إيقاف المراقبة بعد التحميل
                        }
                    },
                    { rootMargin: "400px" } // يبدأ التحميل قبل 400 بكسل من ظهور العنصر لتفادي التأخير
                );

                if (cardRef.current) {
                    observer.observe(cardRef.current);
                }

                return () => {
                    if (cardRef.current) observer.disconnect();
                };
            }, []);

            // تهيئة مشغل Vimeo فقط عندما يصبح العنصر مرئياً
            useEffect(() => {
                if (!isVisible || !iframeRef.current) return;

                const player = new Vimeo.Player(iframeRef.current);
                playerRef.current = player;
                
                player.on('loaded', () => setIsLoaded(true));
                player.on('play', () => setIsLoaded(true));

                player.ready().then(() => {
                    setIsLoaded(true); 
                    if (isPutin) {
                        player.setVolume(0).then(() => {
                            player.play().then(() => {
                                setIsPlaying(true);
                            }).catch(e => {
                                console.log("Autoplay prevented by mobile browser:", e);
                                setIsPlaying(false); 
                            });
                        });
                    } else {
                        player.pause().catch(e => console.log(e));
                        setIsPlaying(false);
                    }
                });

                player.on('play', () => {
                    if (vimeoId !== activeIdRef.current && !isPutin) {
                        player.pause();
                        setIsPlaying(false);
                    } else {
                        setIsPlaying(true);
                    }
                });

                player.on('pause', () => setIsPlaying(false));
                
            }, [isVisible]); // الاعتماد على isVisible

            // Handle exclusive playback 
            useEffect(() => {
                if (activeVideoId !== vimeoId && isPlaying && playerRef.current) {
                    playerRef.current.pause();
                    setIsPlaying(false);
                    playerRef.current.setVolume(0); 
                    setIsMuted(true);
                }
            }, [activeVideoId]);

            const handlePlay = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!playerRef.current) return;

                if (!isPlaying) {
                    onActivate(vimeoId); 
                    playerRef.current.play();
                    playerRef.current.setVolume(1); 
                    setIsPlaying(true);
                    setIsMuted(false);
                } else {
                    playerRef.current.pause();
                    setIsPlaying(false);
                }
            };

            const toggleMute = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!playerRef.current) return;
                const nextMuteState = !isMuted;
                playerRef.current.setVolume(nextMuteState ? 0 : 1);
                setIsMuted(nextMuteState);
                
                if (!nextMuteState && !isPlaying) {
                    onActivate(vimeoId);
                    playerRef.current.play();
                    setIsPlaying(true);
                }
            };

            const themes = {
                cyan: { gradient: 'from-cyan-500 to-blue-500', titleColor: 'group-hover:text-cyan-400', btn: 'bg-cyan-500/30 border-cyan-500/50 hover:bg-cyan-500/80 hover:border-cyan-400 shadow-[0_4px_15px_rgba(6,182,212,0.3)] hover:shadow-[0_6px_20px_rgba(6,182,212,0.6)]', spinner: 'border-cyan-500/30 border-t-cyan-500' },
                emerald: { gradient: 'from-emerald-500 to-cyan-500', titleColor: 'group-hover:text-emerald-400', btn: 'bg-emerald-500/30 border-emerald-500/50 hover:bg-emerald-500/80 hover:border-emerald-400 shadow-[0_4px_15px_rgba(16,185,129,0.3)] hover:shadow-[0_6px_20px_rgba(16,185,129,0.6)]', spinner: 'border-emerald-500/30 border-t-emerald-500' },
                purple: { gradient: 'from-purple-500 to-pink-500', titleColor: 'group-hover:text-purple-400', btn: 'bg-purple-500/30 border-purple-500/50 hover:bg-purple-500/80 hover:border-purple-400 shadow-[0_4px_15px_rgba(168,85,247,0.3)] hover:shadow-[0_6px_20px_rgba(168,85,247,0.6)]', spinner: 'border-purple-500/30 border-t-purple-500' },
                pink: { gradient: 'from-pink-500 to-rose-500', titleColor: 'group-hover:text-pink-400', btn: 'bg-pink-500/30 border-pink-500/50 hover:bg-pink-500/80 hover:border-pink-400 shadow-[0_4px_15px_rgba(236,72,153,0.3)] hover:shadow-[0_6px_20px_rgba(236,72,153,0.6)]', spinner: 'border-pink-500/30 border-t-pink-500' },
                blue: { gradient: 'from-blue-500 to-cyan-500', titleColor: 'group-hover:text-blue-400', btn: 'bg-blue-500/30 border-blue-500/50 hover:bg-blue-500/80 hover:border-blue-400 shadow-[0_4px_15px_rgba(59,130,246,0.3)] hover:shadow-[0_6px_20px_rgba(59,130,246,0.6)]', spinner: 'border-blue-500/30 border-t-blue-500' },
                default: { gradient: 'from-[#00f2fe] via-[#f093fb] to-[#4facfe]', titleColor: 'text-white', btn: 'bg-slate-500/30 border-slate-500/50 hover:bg-slate-500/80 hover:border-slate-400 shadow-[0_4px_15px_rgba(100,116,139,0.3)]', spinner: 'border-slate-500/30 border-t-slate-500' }
            };
            const theme = themes[colorTheme] || themes.default;

            return (
                <div ref={cardRef} className={`${isLarge ? 'w-full max-w-[320px] md:max-w-[350px] transformation-border p-4 md:p-5' : `w-[82vw] sm:w-[60vw] md:w-auto snap-center shrink-0 p-3 md:p-4 hover:border-${colorTheme}-500/50 flex-col hover:-translate-y-2`} glass-card rounded-[2.5rem] relative group border border-white/10 transition-all duration-500 flex ${delayClass}`}>
                    
                    {!isLarge && (
                        <div className={`absolute -inset-0.5 bg-gradient-to-r ${theme.gradient} rounded-[2.2rem] blur opacity-0 group-hover:opacity-30 transition-opacity duration-500 pointer-events-none`}></div>
                    )}
                    
                    <div className="aspect-[9/16] w-full rounded-[2rem] overflow-hidden bg-slate-900 relative border border-white/10 shadow-2xl flex items-center justify-center">
                        
                        <div className={`absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900/90 backdrop-blur-md transition-opacity duration-700 ${isLoaded ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                            <div className={`w-8 h-8 md:w-10 md:h-10 border-4 ${theme.spinner} rounded-full animate-spin mb-3`}></div>
                            <span className="text-white/50 text-[10px] font-bold tracking-widest uppercase animate-pulse">Loading...</span>
                        </div>

                        <div className="absolute top-4 left-4 z-20 flex flex-col gap-2 pointer-events-none">
                            <span className={`${badgeColor} text-white text-[10px] md:text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg`}>
                                {badge}
                            </span>
                        </div>

                        <div className="absolute top-4 right-4 z-30 flex flex-col gap-3">
                            <button onClick={toggleMute} className={`w-10 h-10 md:w-12 md:h-12 rounded-full glass-btn flex items-center justify-center cursor-pointer ${theme.btn}`} aria-label="Toggle Sound">
                                <i className={`fas ${isMuted ? 'fa-volume-xmark' : 'fa-volume-high'} text-[11px] md:text-sm`}></i>
                            </button>
                            <button onClick={handlePlay} className={`w-10 h-10 md:w-12 md:h-12 rounded-full glass-btn flex items-center justify-center cursor-pointer relative ${!isPlaying ? 'animate-pulse' : ''} ${theme.btn}`} aria-label="Play Video">
                                <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play'} text-[11px] md:text-sm ${!isPlaying ? 'translate-x-0.5' : ''}`}></i>
                            </button>
                        </div>

                        <div className={`absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black/90 to-transparent z-20 pointer-events-none ${!isLarge && 'hidden'}`}>
                            <p className="text-white font-bold text-sm md:text-base">{title}</p>
                            <p className="text-slate-400 text-[10px] md:text-xs mt-1 italic">{subtitle}</p>
                        </div>
                        
                        {/* يتم رندر ال iframe فقط عندما يقترب من الشاشة */}
                        {isVisible && (
                            <iframe 
                                ref={iframeRef} 
                                src={`https://player.vimeo.com/video/${vimeoId}?background=1&autoplay=1&loop=1&muted=1&playsinline=1&autopause=0`} 
                                className={`absolute inset-0 w-full h-full object-cover scale-[1.05] transition-opacity duration-1000 ${isLoaded ? 'opacity-100' : 'opacity-0'}`} 
                                allow="autoplay; fullscreen; picture-in-picture"
                                title={title}
                                loading="lazy"
                            ></iframe>
                        )}
                    </div>

                    {!isLarge && (
                        <div className="mt-4 md:mt-5 mb-1 md:mb-2 px-2 flex flex-col flex-grow relative z-10">
                            <h4 className={`text-white font-bold text-sm md:text-base mb-1 md:mb-2 ${theme.titleColor} transition-colors`}>{title}</h4>
                            <p className="text-[11px] md:text-xs text-slate-400 mb-3 md:mb-4 flex-grow">{subtitle}</p>
                            <div className="flex justify-between items-center mt-auto pt-3 border-t border-white/5">
                                <span className={`text-[9px] md:text-[10px] px-2 py-1 rounded border bg-${colorTheme}-500/20 text-${colorTheme}-300 border-${colorTheme}-500/30`}>{badge}</span>
                                <span className="bg-white/10 text-white text-[9px] md:text-[10px] px-2 py-1 rounded">High Quality</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AnimatedCounter = ({ end, suffix = "", prefix = "", duration = 2000, decimals = 0, startTrigger = true }) => {
            const [count, setCount] = useState(0);
            
            useEffect(() => {
                if (!startTrigger) return;
                let startTime = null;
                let animationFrame;
                
                const step = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                    setCount(easeOutQuart * end);
                    if (progress < 1) {
                        animationFrame = window.requestAnimationFrame(step);
                    } else {
                        setCount(end);
                    }
                };
                animationFrame = window.requestAnimationFrame(step);
                
                return () => window.cancelAnimationFrame(animationFrame);
            }, [end, duration, startTrigger]);

            return <span>{prefix}{count.toFixed(decimals)}{suffix}</span>;
        };

        const App = () => {
            const myUpworkLink = "https://www.upwork.com/freelancers/~0182de24aaaf87d777?mp_source=share";
            const mainPortfolioUrl = "index.html";

            const [showPreloader, setShowPreloader] = useState(true); 
            const [activeVideoId, setActiveVideoId] = useState("1178509950");
